server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/pravinx29/java-microservices-crud.git
          default-label: main      # branch name
          search-paths: config
          clone-on-start: true
# Force a fresh clone into this new folder
          basedir: ${user.home}/config-repo-cache-new