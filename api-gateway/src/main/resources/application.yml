server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true # Keep this for auto-discovery of other services

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# Keep Actuator for testing
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info